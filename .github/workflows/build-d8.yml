name: Build V8 d8 Shell (For V8 Forks)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_d8:
    runs-on: ubuntu-latest
    
    steps:
      - name: Maximize Disk Space
        run: |
          echo "Cleaning up runner disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl xz-utils pkg-config ccache

      # Check out your fork repository directly into a directory named 'v8'
      - name: Checkout V8 Fork Source
        uses: actions/checkout@v4
        with:
          path: v8

      - name: Install Google Depot Tools
        run: |
          git clone https://googlesource.com
          echo "$(pwd)/depot_tools" >> $GITHUB_PATH

      - name: Cache Ccache Compiler Objects
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: v8-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            v8-ccache-${{ runner.os }}-

      # This configures gclient to recognize your checked-out directory as the target
      - name: Configure Gclient and Sync Dependencies
        run: |
          export PATH="$(pwd)/depot_tools:$PATH"
          
          # Initialize gclient configuration manually for the existing V8 directory
          gclient config --spec 'solutions = [{ "name": "v8", "url": "https://github.com{{ github.repository }}.git", "deps_file": "DEPS", "managed": False }]'
          
          cd v8
          # Fetch heavy third-party dependencies required for building
          gclient sync --force --no-history --noprehooks
          gclient runhooks

      - name: Install V8 Build Dependencies
        run: |
          cd v8
          export DEBIAN_FRONTEND=noninteractive
          sudo ./build/install-build-deps.sh --no-prompt --no-chromeos-fonts --no-nacl

      - name: Generate GN Build Configurations
        run: |
          cd v8
          export PATH="$(pwd)/../depot_tools:$PATH"
          gn gen out/x64.release --args='
            is_debug=false 
            target_cpu="x64" 
            v8_monolithic=false 
            is_component_build=false 
            v8_use_external_startup_data=false 
            symbols_include_type="none" 
            blink_symbol_level=0 
            v8_symbol_level=0
            v8_enable_future_features=true
            v8_enable_webassembly=true
            v8_enable_wasm_gdb_remote_support=true
            v8_enable_experimental_regexp_engine=true
            cc_wrapper="ccache"
          '

      - name: Compile d8 Shell
        run: |
          cd v8
          export PATH="$(pwd)/../depot_tools:$PATH"
          ccache -z
          ninja -C out/x64.release d8
          ccache -s

      - name: Upload d8 Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: d8-linux-x64-experimental
          path: |
            v8/out/x64.release/d8
            v8/out/x64.release/icudtl.dat
